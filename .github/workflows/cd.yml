name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Go Tests and Build"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: SSH into the server and deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_SERVER_IP }} << 'EOF'
            cd /home/balloon-shop
            git fetch origin
            git checkout go-only-server
            git reset --hard origin/go-only-server
          
            cd deploy
            sudo docker-compose down
            sudo docker-compose up -d --build
            echo "Docker Compose deployment completed."
          
            # Run DB migrations
            echo "Running database migrations..."
            if ! sudo docker exec -t backend sh -c 'migrate -path ./infrastructure/db/migrations -database "$DATABASE_URL" up'; then
              echo "ERROR: Database migrations failed. Aborting deployment."
              exit 1
            fi
          
            # Fill slugs
            echo "Filling slugs..."
            sudo docker exec -t backend sh -c 'cd /build && ./fill_slugs'
          EOF
