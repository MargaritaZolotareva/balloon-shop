services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - ../backend:/app
      - static_data:/usr/share/nginx/html
    working_dir: /app
    env_file:
      - ../.env
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    command: ["/build/balloon-shop"]
    ports:
      - "8080:8080"

  db:
    image: postgres:alpine
    container_name: db
    env_file:
      - ../.env
    volumes:
      - balloon_shop_db_data:/var/lib/postgresql/data
      - ./db-healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      retries: 5
      start_period: 1m
      timeout: 10s
    ports:
      - "5433:5432"

  nginx:
    build:
      context: ..
      dockerfile: nginx/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  grafana:
    image: grafana/grafana:nightly
    env_file:
      - ../.env
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - prometheus

networks:
  app-network:
    driver: bridge

volumes:
  balloon_shop_db_data:
  static_data: